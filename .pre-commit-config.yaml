# .pre-commit-config.yaml
#
# Install once with: pre-commit install
# Run against all files: pre-commit run --all-files

# Shell dotfiles here have no extension or shebang, so they are not
# auto-detected as shell. Match them explicitly and force types: [file].
default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        # shfmt reads indentation from .editorconfig automatically.
        args: [--write]
        types: [file]
        files: &shell_files '^\.(bash_(aliases|exports|functions|profile|scripts)|macos)$'

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [--shell=bash]
        types: [file]
        files: *shell_files
